version: '3.8'

services:
  # Databases
  mongodb:
    image: mongo:latest
    container_name: mongodb_agente
    ports: ["27017:27017"]
    volumes: ["mongodb_data:/data/db"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_agente
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_storage:/qdrant/storage"]

  postgres:
    image: postgres:latest
    container_name: sql_agente
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_DB=${PG_DB}
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  # MCP Servers
  mcp-mongodb:
    image: node:18-slim
    container_name: mcp_mongodb_server
    command: npx @mongodb-js/mongodb-mcp-server --mongodbMock=false --mongodbUrl=mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/
    depends_on: [mongodb]

  mcp-qdrant:
    image: python:3.11-slim
    container_name: mcp_qdrant_server
    command: bash -c "pip install qdrant-mcp-server && qdrant-mcp-server"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on: [qdrant]

  mcp-postgres:
    image: node:18-slim
    container_name: mcp_postgres_server
    command: npx @modelcontextprotocol/server-postgres --url=postgresql://${PG_USER}:${PG_PASS}@postgres:5432/${PG_DB}
    depends_on: [postgres]

  mcp-fetch:
    image: node:18-slim
    container_name: mcp_fetch_server
    command: npx @modelcontextprotocol/server-fetch

  # Backend Agente
  app-agente:
    build: .
    container_name: backend_agente
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      - mcp-mongodb
      - mcp-qdrant
      - mcp-postgres
      - mcp-fetch

volumes:
  mongodb_data:
  qdrant_storage:
  postgres_data:
